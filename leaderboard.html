<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Leaderboard</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div style="font-size:18px;font-weight:800">🏆 Leaderboard</div>
    <div class="tb-bal">💰 <span id="tbBal">0.00</span> <small>BDT</small></div>
  </div>
</div>

<div class="pg fade-in" style="padding-top:14px">

  <!-- TABS -->
  <div class="lb-tabs">
    <div class="lb-tab active" id="tab-earn" onclick="switchTab('earn')">💰 Top Earners</div>
    <div class="lb-tab" id="tab-ref" onclick="switchTab('ref')">🔗 Top Referrers</div>
  </div>

  <!-- MY RANK BAR -->
  <div style="background:rgba(124,58,237,.12);border:1px solid var(--brh);border-radius:var(--r2);padding:12px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:12px;color:var(--t2);font-weight:600">Your Current Rank</div>
    <div style="font-size:20px;font-weight:900;color:var(--pu)" id="myRankNum">#–</div>
  </div>

  <!-- PODIUM -->
  <div class="podium" id="podium"></div>

  <!-- LIST -->
  <div class="stitle">🎖️ Full Rankings</div>
  <div id="lbList"></div>

</div>

<nav class="bnav">
  <a href="home.html" class="bn-item" data-p="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="earn.html" class="bn-item" data-p="earn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Earn
  </a>
  <a href="earn.html" class="bn-center">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </a>
  <a href="wallet.html" class="bn-item" data-p="wallet">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 18v1a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v1h-9a2 2 0 00-2 2v8a2 2 0 002 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>Wallet
  </a>
  <a href="profile.html" class="bn-item" data-p="profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>Profile
  </a>
</nav>

<script type="module">
import { auth, db } from './assets/firebase/firebase.js';
import { doc, getDoc, getDocs, collection, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

let uid, currentTab = 'earn';

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }
  uid = user.uid;
  const snap = await getDoc(doc(db, 'users', uid));
  document.getElementById('tbBal').textContent = parseFloat(snap.data()?.balance || 0).toFixed(2);
  loadBoard('totalEarned');
});

window.switchTab = t => {
  currentTab = t;
  document.getElementById('tab-earn').classList.toggle('active', t === 'earn');
  document.getElementById('tab-ref').classList.toggle('active', t === 'ref');
  loadBoard(t === 'earn' ? 'totalEarned' : 'referralCount');
};

async function loadBoard(field) {
  const snap = await getDocs(query(collection(db, 'users'), orderBy(field, 'desc'), limit(25)));
  const users = [];
  snap.forEach(d => users.push({ id: d.id, ...d.data() }));
  const prefix = field === 'totalEarned' ? '৳' : '';
  const valFn = u => field === 'totalEarned' ? parseFloat(u.totalEarned || 0).toFixed(2) : (u.referralCount || 0);

  // Podium
  const podEl = document.getElementById('podium');
  podEl.innerHTML = '';
  const visOrder = [1, 0, 2];
  const podCls = ['pod-p2', 'pod-p1', 'pod-p3'];
  const crowns = ['👑', '🥈', '🥉'];
  const mtops = ['30px', '0', '40px'];
  visOrder.forEach((origIdx, vi) => {
    const u = users[origIdx];
    if (!u) return;
    const isMe = u.id === uid;
    podEl.innerHTML += `<div class="${podCls[vi]}" style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;margin-top:${mtops[vi]}">
      <div style="position:relative">
        <div class="pod-crown">${crowns[origIdx]}</div>
        <div class="pod-av" style="${isMe ? 'border-width:3px;box-shadow:0 0 14px var(--pglow)' : ''}">${(u.username || 'U')[0].toUpperCase()}</div>
      </div>
      <div class="pod-name" title="${u.username}">${u.username || 'User'}</div>
      <div class="pod-val">${prefix}${valFn(u)}</div>
    </div>`;
  });

  // List (4+)
  const listEl = document.getElementById('lbList');
  listEl.innerHTML = '';
  let myRank = '–';
  users.forEach((u, i) => {
    if (u.id === uid) myRank = i + 1;
    if (i < 3) return;
    const isMe = u.id === uid;
    listEl.innerHTML += `<div class="lb-item${isMe ? ' me' : ''}">
      <div class="lb-rank rn">${i + 1}</div>
      <div class="lb-av" style="font-size:13px">${(u.username || 'U')[0].toUpperCase()}</div>
      <div class="lb-name">${u.username || 'User'}${isMe ? ' <span style="font-size:10px;color:var(--pl)">(You)</span>' : ''}</div>
      <div class="lb-val">${prefix}${valFn(u)}</div>
    </div>`;
  });
  if (users.length <= 3) listEl.innerHTML = '<div class="empty"><div class="ei">🏆</div><p>Be among the first top earners!</p></div>';
  document.getElementById('myRankNum').textContent = myRank !== '–' ? '#' + myRank : '#–';
}
</script>
</body>
</html>
