<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Login</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>body{padding:0;min-height:100svh;display:flex;flex-direction:column;justify-content:center}</style>
</head>
<body>
<div class="auth-pg fade-in" style="width:100%">
  <div class="auth-logo">
    <div class="al">💎</div>
    <h1>EarnPro</h1>
    <p>Your premium earning platform</p>
  </div>
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="sub">Sign in to continue earning</p>

    <div class="igroup ifield-ico">
      <label>Email Address</label>
      <span class="ico">✉️</span>
      <input type="email" id="em" class="ifield" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="igroup" style="position:relative">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="pw" class="ifield" placeholder="••••••••" style="padding-right:44px" autocomplete="current-password">
        <button id="eyeBtn" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0">👁️</button>
      </div>
    </div>
    <div style="text-align:right;margin-bottom:16px;margin-top:-6px">
      <a href="#" class="lnk" id="forgotBtn">Forgot password?</a>
    </div>
    <button class="btn btn-p btn-full btn-lg" id="loginBtn">🚀 Login to EarnPro</button>
    <div class="divider"></div>
    <p class="auth-foot" style="margin:0">No account? <a href="register.html">Create one free</a></p>
  </div>
</div>

<script type="module">
import { auth } from './assets/firebase/firebase.js';
import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { toast, showLoader, hideLoader } from './assets/js/app.js';

onAuthStateChanged(auth, u => { if (u) location.href = 'home.html'; });

document.getElementById('eyeBtn').addEventListener('click', function() {
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
  this.textContent = p.type === 'password' ? '👁️' : '🙈';
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  if (!em || !pw) { toast('Please fill all fields', 'err'); return; }
  showLoader('Signing in...');
  try {
    await signInWithEmailAndPassword(auth, em, pw);
    toast('Welcome back! 🎉', 'ok');
    setTimeout(() => location.href = 'home.html', 400);
  } catch (e) {
    hideLoader();
    const m = {
      'auth/user-not-found': 'No account with this email',
      'auth/wrong-password': 'Incorrect password',
      'auth/invalid-email': 'Invalid email address',
      'auth/too-many-requests': 'Too many attempts, try later',
      'auth/invalid-credential': 'Invalid email or password'
    };
    toast(m[e.code] || 'Login failed. Try again.', 'err');
  }
});

document.getElementById('forgotBtn').addEventListener('click', async e => {
  e.preventDefault();
  const em = document.getElementById('em').value.trim();
  if (!em) { toast('Enter your email first', 'warn'); return; }
  try {
    await sendPasswordResetEmail(auth, em);
    toast('Password reset email sent 📧', 'ok');
  } catch { toast('Failed to send reset email', 'err'); }
});
</script>
</body>
</html>
