<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Home</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="tb-user">
      <div class="tb-av" id="tbAv">EP</div>
      <div>
        <div class="tb-name" id="tbName">Loading...</div>
        <div class="tb-badge" id="tbBadge">👤 Free</div>
      </div>
    </div>
    <div class="tb-bal">💰 <span id="tbBal">0.00</span> <small>BDT</small></div>
  </div>
</div>

<div class="pg fade-in" style="padding-top:14px">

  <!-- NOTICE -->
  <div class="notice-bar" id="noticeBar" style="display:none">
    <div class="n-tag">📢 LIVE</div>
    <div class="n-scroll"><div class="n-txt" id="noticeTxt"></div></div>
  </div>

  <!-- BALANCE -->
  <div class="bal-card">
    <div class="bal-lbl">Total Balance</div>
    <div class="bal-amt"><span>৳</span><span id="balAmt">0.00</span></div>
    <div class="bal-sub">Total Earned: ৳<span id="totalE">0.00</span></div>
    <div class="bal-actions">
      <a href="earn.html" class="btn btn-p"><span>💰</span> Earn Now</a>
      <a href="wallet.html" class="btn btn-ghost"><span>🏦</span> Withdraw</a>
    </div>
  </div>

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-ico">📺</div>
      <div class="stat-val" id="stAds">0</div>
      <div class="stat-lbl">Ads Watched</div>
    </div>
    <div class="stat-box">
      <div class="stat-ico">👥</div>
      <div class="stat-val" id="stRef">0</div>
      <div class="stat-lbl">Referrals</div>
    </div>
    <div class="stat-box">
      <div class="stat-ico">✅</div>
      <div class="stat-val" id="stTasks">0</div>
      <div class="stat-lbl">Tasks Done</div>
    </div>
    <div class="stat-box">
      <div class="stat-ico">🏆</div>
      <div class="stat-val" id="stRank">#–</div>
      <div class="stat-lbl">Your Rank</div>
    </div>
  </div>

  <!-- DAILY BONUS -->
  <div class="daily-card">
    <div>
      <div style="font-size:14px;font-weight:700">🎁 Daily Bonus</div>
      <div style="font-size:11px;color:var(--t2);margin-top:3px" id="dailyStatus">Claim your free daily reward</div>
    </div>
    <button class="btn btn-gold btn-sm" id="dailyBtn" style="white-space:nowrap">Claim ৳<span id="dailyAmtLbl">2</span></button>
  </div>

  <!-- LEADERBOARD PREVIEW -->
  <div class="stitle">🏆 Top Earners</div>
  <div id="lbPreview"></div>
  <a href="leaderboard.html" style="display:block;text-align:center;padding:10px 0 16px;font-size:12px;color:var(--pl);text-decoration:none;font-weight:700">View Full Leaderboard →</a>

</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a href="home.html" class="bn-item active" data-p="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="earn.html" class="bn-item" data-p="earn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Earn
  </a>
  <a href="earn.html" class="bn-center">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </a>
  <a href="wallet.html" class="bn-item" data-p="wallet">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 18v1a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v1h-9a2 2 0 00-2 2v8a2 2 0 002 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>Wallet
  </a>
  <a href="profile.html" class="bn-item" data-p="profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>Profile
  </a>
</nav>

<script type="module">
import { auth, db } from './assets/firebase/firebase.js';
import { doc, getDoc, getDocs, collection, query, orderBy, limit, updateDoc, increment, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { toast, badgeLbl, getSettings } from './assets/js/app.js';

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }
  const uid = user.uid;

  const [usnap, cfg, nSnap, lbSnap] = await Promise.all([
    getDoc(doc(db, 'users', uid)),
    getSettings(db),
    getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc'), limit(1))),
    getDocs(query(collection(db, 'users'), orderBy('totalEarned', 'desc'), limit(5)))
  ]);

  const u = usnap.data();
  if (!u || u.isBanned) { location.href = 'login.html'; return; }

  // UI
  document.getElementById('tbAv').textContent = (u.username || 'EP')[0].toUpperCase();
  document.getElementById('tbName').textContent = u.username || 'User';
  document.getElementById('tbBadge').innerHTML = badgeLbl(u.membership);
  document.getElementById('tbBal').textContent = parseFloat(u.balance || 0).toFixed(2);
  document.getElementById('balAmt').textContent = parseFloat(u.balance || 0).toFixed(2);
  document.getElementById('totalE').textContent = parseFloat(u.totalEarned || 0).toFixed(2);
  document.getElementById('stAds').textContent = u.adsWatched || 0;
  document.getElementById('stRef').textContent = u.referralCount || 0;
  document.getElementById('stTasks').textContent = (u.claimedTasks || []).length;
  document.getElementById('dailyAmtLbl').textContent = cfg.dailyBonus || 2;

  // Daily bonus state
  const today = new Date().toDateString();
  const lc = u.dailyBonusClaimed;
  const claimedToday = lc && (lc.toDate ? lc.toDate().toDateString() : new Date(lc).toDateString()) === today;
  if (claimedToday) {
    document.getElementById('dailyBtn').textContent = '✅ Claimed';
    document.getElementById('dailyBtn').disabled = true;
    document.getElementById('dailyStatus').textContent = 'Come back tomorrow!';
  }

  document.getElementById('dailyBtn').addEventListener('click', async () => {
    const fresh = (await getDoc(doc(db, 'users', uid))).data();
    const lc2 = fresh.dailyBonusClaimed;
    const ct = lc2 && (lc2.toDate ? lc2.toDate().toDateString() : new Date(lc2).toDateString()) === today;
    if (ct) { toast('Already claimed today!', 'warn'); return; }
    const bonus = cfg.dailyBonus || 2;
    await updateDoc(doc(db, 'users', uid), {
      balance: increment(bonus), totalEarned: increment(bonus), dailyBonusClaimed: serverTimestamp()
    });
    document.getElementById('dailyBtn').textContent = '✅ Claimed';
    document.getElementById('dailyBtn').disabled = true;
    document.getElementById('dailyStatus').textContent = 'Come back tomorrow!';
    const nb = parseFloat(fresh.balance || 0) + bonus;
    document.getElementById('balAmt').textContent = nb.toFixed(2);
    document.getElementById('tbBal').textContent = nb.toFixed(2);
    toast(`+৳${bonus} Daily bonus claimed! 🎁`, 'ok');
  });

  // Notice
  if (!nSnap.empty) {
    document.getElementById('noticeTxt').textContent = nSnap.docs[0].data().text;
    document.getElementById('noticeBar').style.display = 'flex';
  }

  // Leaderboard preview
  const lbEl = document.getElementById('lbPreview');
  const crowns = ['👑', '🥈', '🥉'];
  const rankCls = ['r1', 'r2', 'r3'];
  let myRank = '–', idx = 0;
  lbSnap.forEach(d => {
    idx++;
    const lu = d.data();
    if (d.id === uid) myRank = '#' + idx;
    const rc = idx <= 3 ? rankCls[idx - 1] : 'rn';
    lbEl.innerHTML += `<div class="lb-item${d.id === uid ? ' me' : ''}">
      <div class="lb-rank ${rc}">${idx <= 3 ? crowns[idx - 1] : idx}</div>
      <div class="lb-av" style="font-size:13px">${(lu.username || 'U')[0].toUpperCase()}</div>
      <div class="lb-name">${lu.username || 'User'}${d.id === uid ? ' <span style="color:var(--pl);font-size:10px">(You)</span>' : ''}</div>
      <div class="lb-val">৳${parseFloat(lu.totalEarned || 0).toFixed(2)}</div>
    </div>`;
  });
  document.getElementById('stRank').textContent = myRank ? '#' + myRank.replace('#', '') : '#–';

  await updateDoc(doc(db, 'users', uid), { lastSeen: serverTimestamp() });
});
</script>
</body>
</html>
